name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/dpa-collecte

jobs:

  # ── Étape 1 : Build de l'image Docker et push sur GHCR ─────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Activer BuildKit + cache
        uses: docker/setup-buildx-action@v3

      - name: Build & push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://${{ secrets.DOMAIN }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Étape 2 : Déploiement sur le VPS ────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Préparer la clé SSH
        run: |
          mkdir -p ~/.ssh
          # tr -d '\r' supprime les éventuels CRLF Windows
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Créer le fichier .env et le copier sur le VPS
        run: |
          cat > /tmp/prod.env << 'EOF'
          DOMAIN=${{ secrets.DOMAIN }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
          EOF
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              /tmp/prod.env \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/.env"

      - name: Copier docker-compose.prod.yml sur le VPS
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              docker-compose.prod.yml \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Déployer via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e
               echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
               cd '${{ secrets.VPS_DEPLOY_PATH }}'
               docker pull ghcr.io/${{ github.repository_owner }}/dpa-collecte:latest
               docker compose -f docker-compose.prod.yml up -d --remove-orphans
               docker image prune -f
               echo '✅ Déploiement terminé'"
