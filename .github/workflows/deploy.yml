name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/dpa-collecte

jobs:

  # ── Étape 1 : Build de l'image Docker et push sur GHCR ─────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Activer BuildKit + cache
        uses: docker/setup-buildx-action@v3

      - name: Build & push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXTAUTH_URL=https://${{ secrets.DOMAIN }}
            NEXT_PUBLIC_APP_URL=https://${{ secrets.DOMAIN }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Étape 2 : Déploiement sur le VPS ────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Copier docker-compose.prod.yml sur le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.prod.yml"
          target:   ${{ secrets.VPS_DEPLOY_PATH }}
          strip_components: 1

      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Écrire le fichier .env à partir des secrets GitHub
            cat > .env << 'ENVEOF'
            DOMAIN=${{ secrets.DOMAIN }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            ENVEOF

            # Connexion GHCR pour puller la nouvelle image
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Récupérer la nouvelle image
            docker pull ghcr.io/${{ github.repository_owner }}/dpa-collecte:latest

            # Redémarrer les conteneurs sans interruption
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Nettoyage des anciennes images inutilisées
            docker image prune -f

            echo "✅ Déploiement terminé — $(date)"
